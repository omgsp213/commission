<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณค่าคอมมิชชั่น - FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .strike-red { text-decoration: line-through; text-decoration-color: #ef4444; text-decoration-thickness: 2px; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-10 text-slate-800">

    <div class="max-w-[98%] mx-auto space-y-6">
        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">ระบบคำนวณค่าคอมมิชชั่น</h1>
                <p id="status-text" class="text-blue-500 mt-1 font-medium italic animate-pulse">⏳ กำลังเตรียมข้อมูล...</p>
            </div>
            <button onclick="fetchAllData()" class="bg-slate-800 hover:bg-black text-white px-5 py-2.5 rounded-xl text-sm transition-all shadow-md">
                🔄 รีเฟรชข้อมูล (Sync)
            </button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100 text-sm font-bold">
                            <th class="p-4 text-slate-600 w-12 text-center">#</th>
                            <th class="p-4 text-slate-600">ชื่อร้าน</th>
                            <th class="p-4 text-slate-600">ช่องทางโอนเงิน</th>
                            <th class="p-4 text-slate-600">หมายเหตุ</th>
                            <th class="p-4 text-slate-600 w-36 text-center">ยอดสะสม</th>
                            <th class="p-4 text-slate-600 w-32">ประเภท</th>
                            <th class="p-4 text-blue-600 text-right w-36">ค่าคอมฯ (Agent)</th>
                            <th class="p-4 text-center w-16 text-rose-500">ลบ</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <div class="mt-6 flex gap-3">
                <button onclick="addRow()" class="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold py-2 px-6 rounded-xl transition shadow-sm">+ เพิ่มแถวเอง</button>
                <button onclick="showSummary()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-8 rounded-xl shadow-lg shadow-blue-200 transition text-lg">📊 สรุปรายการ & บันทึก PDF</button>
            </div>
        </div>
    </div>

    <div id="summaryModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[95vh] flex flex-col shadow-2xl">
            <div id="pdf-content" class="p-10 overflow-y-auto flex-grow bg-white">
                <div class="flex justify-between items-start mb-8 border-b pb-6 border-slate-200">
                    <h2 class="text-2xl font-bold">รายงานสรุปยอดค่าคอมมิชชั่น</h2>
                    <p class="text-sm text-slate-500" id="report-date"></p>
                </div>
                <div id="summaryContent"></div>
            </div>
            <div class="p-6 border-t flex justify-end gap-3 bg-slate-50 rounded-b-2xl">
                <button onclick="closeSummary()" class="bg-gray-200 hover:bg-gray-300 text-gray-600 font-bold py-2.5 px-6 rounded-xl transition">กลับไปแก้ไข</button>
                <button onclick="generatePDF(this)" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-8 rounded-xl transition">💾 บันทึก PDF</button>
            </div>
        </div>
    </div>

    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbwgy8vwqcTWjvDsg2Yh_2kOMT3IeL6YmJnLB0mlcyVcUN5tg53rIfjKnKTc2ndGjwcf/exec';
        let rowCount = 0;

        async function fetchAllData() {
            const status = document.getElementById('status-text');
            status.innerText = "⏳ กำลังดึงข้อมูลล่าสุด...";
            try {
                const response = await fetch(scriptUrl);
                const data = await response.json();
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = ''; rowCount = 0;
                data.forEach(item => { if(item.name) addRow(item.name, item.amount, item.type, item.note); });
                status.innerText = `✅ ซิงค์สำเร็จ (${rowCount} รายการ)`;
                status.className = "text-green-600 mt-1 font-medium italic";
            } catch (error) {
                status.innerText = "❌ เกิดปัญหาการเชื่อมต่อ (ลองเปิดผ่าน Web Server)";
                status.className = "text-red-500 mt-1 font-medium italic";
            }
        }

        function getAgentRate(x) {
            if (x >= 150000) return 0.12;
            if (x >= 100000) return 0.10;
            if (x >= 50000) return 0.08;
            if (x >= 5000) return 0.05;
            return 0.03;
        }

        function getAgentSPRate(x) {
            if (x < 30000) return 0.03;
            if (x < 50000) return 0.04;
            if (x < 75000) return 0.06;
            if (x < 100000) return 0.07;
            let step = Math.floor((x - 100000) / 5000);
            return Math.min(0.09 + (step * 0.001), 0.10);
        }

        function updateRow(id, isInitial = false) {
            const amt = parseFloat(document.getElementById(`amt-${id}`).value) || 0;
            const type = document.getElementById(`type-${id}`).value;
            const noteInput = document.getElementById(`note-${id}`);
            const resDisplay = document.getElementById(`res-${id}`);
            
            const agentComm = amt * getAgentRate(amt);
            resDisplay.innerText = agentComm.toLocaleString('th-TH', { minimumFractionDigits: 2 }) + " ฿";
            resDisplay.dataset.currentValue = agentComm;

            if (type === 'Agent-SP' && amt > 0) {
                const spComm = amt * getAgentSPRate(amt);
                const diff = agentComm - spComm;
                if (!isInitial || !noteInput.value) {
                    noteInput.value = `ยอดโอน ${spComm.toLocaleString('th-TH', { minimumFractionDigits: 2 })} หัก ${diff.toLocaleString('th-TH', { minimumFractionDigits: 2 })}`;
                }
            }
            if (noteInput.value.trim() !== "") resDisplay.classList.add('strike-red');
            else resDisplay.classList.remove('strike-red');
        }

        function addRow(name = "", amt = "", type = "Agent", note = "") {
            rowCount++;
            const tbody = document.getElementById('table-body');
            const row = document.createElement('tr');
            row.id = `row-${rowCount}`;
            row.className = "border-b border-slate-50 hover:bg-slate-50 transition text-sm font-medium";
            row.innerHTML = `
                <td class="p-3 text-slate-400 text-center">${rowCount}</td>
                <td class="p-3"><input type="text" id="name-${rowCount}" value="${name}" class="w-full p-2 border rounded-lg"></td>
                <td class="p-3"><input type="text" id="pay-${rowCount}" placeholder="ธนาคาร" class="w-full p-2 border rounded-lg"></td>
                <td class="p-3"><input type="text" id="note-${rowCount}" value="${note}" oninput="updateRow(${rowCount})" class="w-full p-2 border rounded-lg"></td>
                <td class="p-3"><input type="number" id="amt-${rowCount}" value="${amt}" oninput="updateRow(${rowCount})" class="w-full p-2 border rounded-lg font-bold text-center"></td>
                <td class="p-3">
                    <select id="type-${rowCount}" onchange="updateRow(${rowCount})" class="w-full p-2 border rounded-lg bg-white">
                        <option value="Agent" ${type==='Agent'?'selected':''}>Agent</option>
                        <option value="Agent-SP" ${type==='Agent-SP'?'selected':''}>Agent-SP</option>
                    </select>
                </td>
                <td class="p-3 text-right font-bold" id="res-${rowCount}" data-current-value="0">0.00 ฿</td>
                <td class="p-3 text-center"><button onclick="this.closest('tr').remove()" class="text-rose-400 font-bold">✕</button></td>
            `;
            tbody.appendChild(row);
            updateRow(rowCount, note !== "");
        }

        function showSummary() {
            const rows = document.querySelectorAll('#table-body tr');
            let totalAmt = 0, totalComm = 0, count = 0;
            let html = `<table class="w-full mt-8 border-collapse">
                <thead><tr class="text-left text-slate-400 border-b text-xs uppercase font-bold">
                <th class="pb-3 px-2">ร้านค้า</th><th class="pb-3 text-right">ยอดสะสม</th><th class="pb-3 text-right">ค่าคอมฯ</th>
                </tr></thead><tbody class="divide-y">`;

            rows.forEach(row => {
                const id = row.id.split('-')[1];
                const amt = parseFloat(document.getElementById(`amt-${id}`).value) || 0;
                if (amt > 0) {
                    const name = document.getElementById(`name-${id}`).value;
                    const note = document.getElementById(`note-${id}`).value;
                    const comm = parseFloat(document.getElementById(`res-${id}`).dataset.currentValue) || 0;
                    totalAmt += amt; totalComm += comm; count++;
                    html += `<tr><td class="py-4 px-2 font-bold">${name}<div class="text-red-600 text-xs italic">หมายเหตุ: ${note || '-'}</div></td>
                    <td class="py-4 text-right">${amt.toLocaleString()} ฿</td>
                    <td class="py-4 text-right font-bold ${note.trim()?'strike-red':''}">${comm.toLocaleString(undefined,{minimumFractionDigits:2})} ฿</td></tr>`;
                }
            });

            if (count === 0) return alert("กรุณากรอกยอดเงิน");
            document.getElementById('report-date').innerText = "ออกรายงาน: " + new Date().toLocaleString('th-TH');
            document.getElementById('summaryContent').innerHTML = `
                <div class="grid grid-cols-3 gap-4 mb-8">
                    <div class="bg-slate-50 p-4 rounded-xl border">สะสมรวม: <br><b>${totalAmt.toLocaleString()} ฿</b></div>
                    <div class="bg-slate-50 p-4 rounded-xl border">ค่าจ้าง (2%): <br><b>${(totalAmt*0.02).toLocaleString(undefined,{minimumFractionDigits:2})} ฿</b></div>
                    <div class="bg-blue-600 p-4 rounded-xl text-white font-bold">ค่าคอมรวม: <br><b>${totalComm.toLocaleString(undefined,{minimumFractionDigits:2})} ฿</b></div>
                </div>${html}</tbody></table>`;
            document.getElementById('summaryModal').classList.remove('hidden');
        }

        function closeSummary() { document.getElementById('summaryModal').classList.add('hidden'); }

        function generatePDF(btn) {
            const element = document.getElementById('pdf-content');
            html2pdf().set({ margin: 10, filename: 'Report.pdf', image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 2 }, jsPDF: { format: 'a4' } }).from(element).save();
        }

        window.onload = fetchAllData;
    </script>
</body>
</html>
