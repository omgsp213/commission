<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณเงิน Agent & ค่าจ้าง (Pro - Updated SP Rate)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #059669;
            --danger: #e11d48;
            --bg: #f1f5f9;
        }
        body { font-family: 'Chakra Petch', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; width: 100%; max-width: 480px; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1e293b; margin-top: 0; margin-bottom: 1.5rem; }
        .step { display: none; }
        .active { display: block; }
        
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #475569; }
        select, input { width: 100%; padding: 0.8rem; border: 1.5px solid #e2e8f0; border-radius: 0.75rem; margin-bottom: 1rem; font-size: 1rem; box-sizing: border-box; outline: none; }
        
        .grid-7 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
        .grid-7 input { margin-bottom: 0; }

        button { width: 100%; padding: 1rem; border: none; border-radius: 0.75rem; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-next { background: var(--primary); color: white; }
        .btn-save { background: var(--success); color: white; }
        .btn-back { background: #e2e8f0; color: #475569; }

        .receipt-area { background: white; padding: 20px; border-radius: 10px; border: 1px solid #eee; }
        .receipt { background: #fff; border: 1px dashed #cbd5e1; padding: 1.5rem; border-radius: 0.5rem; }
        .receipt-title { text-align: center; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; font-size: 1.2rem; color: var(--primary); }
        .receipt-date { text-align: center; font-size: 0.85rem; color: #94a3b8; margin-bottom: 15px; }
        .detail-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; color: #64748b; }
        .detail-sum { border-top: 1px solid #eee; margin-top: 10px; padding-top: 10px; font-weight: bold; color: #1e293b; }
        .detail-total { margin-top: 15px; padding-top: 15px; border-top: 2px double #eee; display: flex; justify-content: space-between; font-size: 1.4rem; color: var(--success); font-weight: 800; }
        
        .status-waiting { color: #e11d48 !important; font-size: 1.8rem !important; font-weight: 800; }
        .status-paid { color: #059669 !important; font-size: 1.8rem !important; font-weight: 800; }
        .label-green { color: #059669 !important; font-size: 1.4rem !important; font-weight: 700; }
        
        .note-area { margin-top: 15px; padding-top: 10px; border-top: 1px solid #f1f5f9; font-size: 0.85rem; color: #64748b; text-align: center; line-height: 1.4; }
        .upsell-area { margin-top: 20px; padding: 12px; background: #fffbeb; border-radius: 8px; border: 1px solid #fde68a; font-size: 0.9rem; }
        .upsell-row { display: flex; justify-content: space-between; margin-bottom: 4px; color: #92400e; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <div id="page1" class="step active">
        <h2>💰 ระบบคำนวณเงิน</h2>
        <label>ประเภทการคำนวณ</label>
        <select id="method" onchange="toggleInputs()">
            <option value="Agent">Agent</option>
            <option value="Agent-SP">Agent-SP</option>
            <option value="ค่าจ้าง">ค่าจ้าง</option>
            <option value="Agent-Next">Agent + แนะนำ</option>
            <option value="Agent-SP-Next">Agent-SP + แนะนำ</option>
            <option value="แจ้งเตือนชำระยอด">แจ้งเตือนชำระยอด</option>
        </select>

        <div id="input-single">
            <label id="label-amount">กรอกยอดเงิน</label>
            <input type="number" id="amount" placeholder="ระบุจำนวนเงิน">
        </div>

        <div id="input-extra-6" style="display:none;">
            <label>สถานะการชำระเงิน</label>
            <select id="payment-status">
                <option value="waiting">รอการชำระ</option>
                <option value="paid">ชำระแล้ว</option>
            </select>
            <label>ระบุวันที่ในใบเสร็จ/แจ้งเตือน</label>
            <input type="datetime-local" id="pay-date">
        </div>

        <div id="input-multi" style="display:none;">
            <label>ยอดขายตัวแทนรายบุคคล</label>
            <div class="grid-7">
                <input type="number" class="m-input" placeholder="ลำดับ 1">
                <input type="number" class="m-input" placeholder="ลำดับ 2">
                <input type="number" class="m-input" placeholder="ลำดับ 3">
                <input type="number" class="m-input" placeholder="ลำดับ 4">
                <input type="number" class="m-input" placeholder="ลำดับ 5">
                <input type="number" class="m-input" placeholder="ลำดับ 6">
                <input type="number" class="m-input" placeholder="ลำดับ 7">
            </div>
        </div>
        <button class="btn-next" onclick="calculate()">คำนวณผลลัพธ์</button>
    </div>

    <div id="page2" class="step">
        <h2>📊 รายงานสรุป</h2>
        <div id="capture-area" class="receipt-area">
            <div class="receipt">
                <div id="method-name" class="receipt-title">-</div>
                <div id="receipt-timestamp" class="receipt-date">-</div>
                
                <div id="sub-details" style="display:none;">
                    <div class="detail-item"><span>ตัวแทนลำดับที่ 1:</span> <span id="v1">0</span></div>
                    <div class="detail-item"><span>ตัวแทนลำดับที่ 2:</span> <span id="v2">0</span></div>
                    <div class="detail-item"><span>ตัวแทนลำดับที่ 3:</span> <span id="v3">0</span></div>
                    <div class="detail-item"><span>ตัวแทนลำดับที่ 4:</span> <span id="v4">0</span></div>
                    <div class="detail-item"><span>ตัวแทนลำดับที่ 5:</span> <span id="v5">0</span></div>
                    <div class="detail-item"><span>ตัวแทนลำดับที่ 6:</span> <span id="v6">0</span></div>
                    <div class="detail-item"><span>ตัวแทนลำดับที่ 7:</span> <span id="v7">0</span></div>
                </div>

                <div class="detail-item" id="due-date-row" style="display:none;">
                    <span id="label-due-text">วันที่ต้องชำระ :</span>
                    <span id="out-due-date">-</span>
                </div>

                <div class="detail-item detail-sum" id="total-row">
                    <span id="label-total-text">ยอดรวมทั้งหมด:</span>
                    <span id="out-amount">0</span>
                </div>
                
                <div class="detail-item" id="rate-row">
                    <span>อัตราค่าคอมมิชชั่น:</span>
                    <span id="out-rate">0%</span>
                </div>

                <div class="detail-total" id="result-row">
                    <span id="label-result-text">เงินที่ได้รับ:</span>
                    <span id="out-total">0</span>
                </div>

                <div id="upsell-section" class="upsell-area" style="display:none;">
                    <div class="upsell-row"><span>ขาดอีก:</span> <span id="up-gap">-</span></div>
                    <div class="upsell-row"><span>ค่าคอมฯ จะเพิ่มเป็น:</span> <span id="up-rate">-</span></div>
                    <div class="upsell-row" style="font-weight:bold; margin-top:5px; border-top:1px dashed #fde68a; padding-top:5px;">
                        <span>ยอดคาดการณ์:</span> <span id="up-total">-</span>
                    </div>
                </div>

                <div id="note-section" class="note-area" style="display:none;"></div>
            </div>
        </div>

        <button class="btn-save" onclick="saveAsImage()">📸 บันทึกเป็นรูปภาพ</button>
        <button class="btn-back" onclick="goBack()">กลับไปแก้ไข</button>
    </div>
</div>

<script>
    function toggleInputs() {
        const method = document.getElementById('method').value;
        document.getElementById('input-single').style.display = (method === "ค่าจ้าง") ? 'none' : 'block';
        document.getElementById('input-multi').style.display = (method === "ค่าจ้าง") ? 'block' : 'none';
        document.getElementById('input-extra-6').style.display = (method === "แจ้งเตือนชำระยอด") ? 'block' : 'none';
        document.getElementById('label-amount').innerText = (method === "แจ้งเตือนชำระยอด") ? "ยอดเงินที่ต้องชำระ" : "กรอกยอดเงิน";
    }

    // ฟังก์ชันคำนวณเรท Agent-SP ตามเงื่อนไขใหม่
    function getSPRate(amount) {
        if (amount < 30000) return 3;
        if (amount < 50000) return 4;
        if (amount < 75000) return 6;
        if (amount < 100000) return 7;
        
        // สำหรับยอด ≥ 100,000: เริ่ม 9% แล้วบวก 0.1% ทุกๆ 5,000 บาท
        let steps = Math.floor((amount - 100000) / 5000);
        let rate = 9 + (steps * 0.1);
        
        // คุมเพดานไม่เกิน 10%
        return Math.min(rate, 10);
    }

    function calculate() {
        const method = document.getElementById('method').value;
        const amountInput = parseFloat(document.getElementById('amount').value) || 0;
        const outTotal = document.getElementById('out-total');
        const labelResult = document.getElementById('label-result-text');
        const labelTotal = document.getElementById('label-total-text');
        const outAmount = document.getElementById('out-amount');
        const methodName = document.getElementById('method-name');
        const dueDateRow = document.getElementById('due-date-row');
        const noteSection = document.getElementById('note-section');
        const outRate = document.getElementById('out-rate');
        
        let totalSales = 0, commissionRate = 0;
        const now = new Date();
        const thDate = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        
        // Reset View
        outTotal.className = ""; labelResult.className = "";
        labelResult.innerText = "เงินที่ได้รับ:";
        document.getElementById('rate-row').style.display = 'flex';
        document.getElementById('sub-details').style.display = 'none';
        dueDateRow.style.display = 'none';
        noteSection.style.display = 'none';
        document.getElementById('upsell-section').style.display = 'none';

        if (method === "แจ้งเตือนชำระยอด") {
            const status = document.getElementById('payment-status').value;
            const inputDate = document.getElementById('pay-date').value;
            const dateStr = inputDate ? new Date(inputDate).toLocaleDateString('th-TH', thDate) : now.toLocaleDateString('th-TH', thDate);
            
            methodName.innerText = status === 'paid' ? "ใบเสร็จรับเงิน" : "แจ้งเตือนชำระยอด";
            document.getElementById('receipt-timestamp').innerText = "วันที่แจ้ง: " + now.toLocaleDateString('th-TH', thDate);
            
            dueDateRow.style.display = 'flex';
            document.getElementById('label-due-text').innerText = status === 'paid' ? "วันที่ชำระ :" : "วันที่ต้องชำระ :";
            document.getElementById('out-due-date').innerText = dateStr;
            
            labelTotal.innerText = status === 'paid' ? "ยอดเงินที่ชำระแล้ว :" : "ยอดเงินที่ต้องชำระ :";
            outAmount.innerText = amountInput.toLocaleString() + " บาท";
            
            labelResult.innerText = "สถานะ :";
            labelResult.classList.add('label-green');
            outTotal.innerText = status === 'paid' ? "ชำระแล้ว" : "รอการชำระ";
            outTotal.classList.add(status === 'paid' ? 'status-paid' : 'status-waiting');
            
            if(status !== 'paid') {
                noteSection.style.display = 'block';
                noteSection.innerHTML = "⚠️ <b>หมายเหตุ:</b> โปรดชำระยอดภายในกำหนดเวลาเพื่อรักษาสิทธิ์ของท่าน";
            }
            document.getElementById('rate-row').style.display = 'none';
        } 
        else if (method === "ค่าจ้าง") {
            document.getElementById('sub-details').style.display = 'block';
            methodName.innerText = "สรุปรายการ : ค่าจ้าง";
            document.querySelectorAll('.m-input').forEach((input, i) => {
                let v = parseFloat(input.value) || 0;
                totalSales += v;
                document.getElementById('v' + (i + 1)).innerText = v.toLocaleString() + ".-";
            });
            commissionRate = 2;
            outAmount.innerText = totalSales.toLocaleString() + " บาท";
            outRate.innerText = "2%";
            outTotal.innerText = ((totalSales * 2) / 100).toLocaleString() + " บาท";
        } 
        else {
            totalSales = amountInput;
            labelTotal.innerText = "ยอดการสั่งซื้อทั้งหมด :";
            methodName.innerText = "สรุปรายการ : " + method.replace("-Next", "");
            
            if (method.includes("Agent-SP")) {
                commissionRate = getSPRate(totalSales);
            } else {
                // Tier ของ Agent ปกติ (ตามที่คุณเคยแจ้งไว้ก่อนหน้า)
                const tiers = [
                    {min: 150000, r: 12},
                    {min: 100000, r: 10},
                    {min: 50000, r: 8},
                    {min: 5000, r: 5},
                    {min: 0, r: 3}
                ];
                commissionRate = tiers.find(t => totalSales >= t.min).r;
            }

            outAmount.innerText = totalSales.toLocaleString() + " บาท";
            outRate.innerText = commissionRate.toFixed(1).replace(".0", "") + "%";
            outTotal.innerText = ((totalSales * commissionRate) / 100).toLocaleString() + " บาท";

            // Upsell Logic (แนะนำยอดถัดไป)
            if (method.includes("-Next")) {
                let target = 0, nextR = 0;
                if (method.includes("Agent-SP")) {
                    if (totalSales < 100000) {
                        target = [30000, 50000, 75000, 100000].find(t => t > totalSales);
                    } else if (commissionRate < 10) {
                        // คำนวณหาเป้าถัดไปในทุกๆ 5,000 บาท
                        target = 100000 + (Math.floor((totalSales - 100000) / 5000) + 1) * 5000;
                    }
                    if (target) nextR = getSPRate(target);
                } else {
                    const tiers = [
                        {min: 150000, r: 12},
                        {min: 100000, r: 10},
                        {min: 50000, r: 8},
                        {min: 5000, r: 5},
                        {min: 0, r: 3}
                    ];
                    let idx = tiers.findIndex(t => totalSales >= t.min);
                    if (idx > 0) { 
                        target = tiers[idx-1].min; 
                        nextR = tiers[idx-1].r; 
                    }
                }
                
                if (target) {
                    document.getElementById('upsell-section').style.display = 'block';
                    document.getElementById('up-gap').innerText = (target - totalSales).toLocaleString() + " บาท";
                    document.getElementById('up-rate').innerText = nextR.toFixed(1).replace(".0", "") + "%";
                    document.getElementById('up-total').innerText = ((target * nextR) / 100).toLocaleString() + " บาท";
                }
            }
        }

        if (!method.includes("-Next") && method !== "แจ้งเตือนชำระยอด") {
            document.getElementById('receipt-timestamp').innerText = "วันที่ออก: " + now.toLocaleDateString('th-TH', thDate);
        }

        document.getElementById('page1').classList.remove('active');
        document.getElementById('page2').classList.add('active');
    }

    function saveAsImage() {
        const area = document.getElementById('capture-area');
        html2canvas(area, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Summary-' + Date.now() + '.jpg';
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
        });
    }

    function goBack() {
        document.getElementById('page2').classList.remove('active');
        document.getElementById('page1').classList.add('active');
    }
</script>

</body>
</html>
